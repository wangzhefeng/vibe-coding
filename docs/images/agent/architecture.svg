<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="60" y="70" font-size="30" font-family="Arial" fill="#1f2937">Agent System Building Blocks</text>
  <rect x="80" y="150" width="150" height="80" rx="12" fill="#dbeafe" stroke="#2563eb"/>
  <text x="124" y="198" font-size="24" font-family="Arial" fill="#1e3a8a">Goal</text>

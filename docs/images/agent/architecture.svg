  <line x1="630" y1="385" x2="720" y2="215" stroke="#374151" stroke-width="3"/>
  <text x="60" y="485" font-size="20" font-family="Arial" fill="#475569">An agent is not just an LLM loop; it is an LLM loop constrained by tools, state, and stop conditions.</text>

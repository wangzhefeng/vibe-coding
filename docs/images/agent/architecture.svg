  <line x1="430" y1="190" x2="480" y2="295" stroke="#374151" stroke-width="3"/>
  <line x1="430" y1="190" x2="480" y2="385" stroke="#374151" stroke-width="3"/>
  <line x1="630" y1="115" x2="720" y2="215" stroke="#374151" stroke-width="3"/>

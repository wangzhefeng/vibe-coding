<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520">
  <rect width="960" height="520" fill="#fffaf0"/>
  <text x="60" y="70" font-size="30" font-family="Arial" fill="#1f2937">Workflow or Agent?</text>
  <rect x="70" y="130" width="180" height="70" rx="12" fill="#dbeafe" stroke="#2563eb"/>
  <text x="108" y="173" font-size="22" font-family="Arial" fill="#1e3a8a">Task shape</text>
  <polygon points="360,120 480,165 360,210 240,165" fill="#fde68a" stroke="#d97706"/>
  <text x="302" y="170" font-size="20" font-family="Arial" fill="#92400e">Can the path be</text>
  <text x="303" y="194" font-size="20" font-family="Arial" fill="#92400e">predefined?</text>
  <rect x="560" y="110" width="170" height="70" rx="12" fill="#dcfce7" stroke="#16a34a"/>
  <text x="584" y="153" font-size="22" font-family="Arial" fill="#166534">Workflow</text>
  <rect x="560" y="230" width="170" height="70" rx="12" fill="#fee2e2" stroke="#dc2626"/>
  <text x="618" y="273" font-size="22" font-family="Arial" fill="#991b1b">Agent</text>
  <polygon points="810,220 900,265 810,310 720,265" fill="#e0e7ff" stroke="#4f46e5"/>
  <text x="758" y="270" font-size="20" font-family="Arial" fill="#312e81">Need parallel roles?</text>
  <rect x="720" y="350" width="180" height="70" rx="12" fill="#ecfccb" stroke="#65a30d"/>
  <text x="742" y="393" font-size="22" font-family="Arial" fill="#365314">Multi-agent only if</text>
  <text x="760" y="417" font-size="20" font-family="Arial" fill="#365314">roles are clear</text>
  <line x1="250" y1="165" x2="240" y2="165" stroke="#374151" stroke-width="0"/>
  <line x1="250" y1="165" x2="360" y2="165" stroke="#374151" stroke-width="4"/>
  <line x1="480" y1="145" x2="560" y2="145" stroke="#374151" stroke-width="4"/>
  <line x1="480" y1="185" x2="560" y2="265" stroke="#374151" stroke-width="4"/>
  <line x1="730" y1="265" x2="810" y2="265" stroke="#374151" stroke-width="4"/>
  <line x1="810" y1="310" x2="810" y2="350" stroke="#374151" stroke-width="4"/>
  <text x="500" y="135" font-size="18" font-family="Arial" fill="#334155">Yes</text>
  <text x="500" y="230" font-size="18" font-family="Arial" fill="#334155">No</text>
  <text x="60" y="455" font-size="20" font-family="Arial" fill="#475569">Many systems are better as workflows; use agents only when dynamic decisions materially improve outcomes.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520">
  <rect width="960" height="520" fill="#fffaf0"/>
  <text x="60" y="70" font-size="30" font-family="Arial" fill="#1f2937">Stdio vs SSE Decision</text>
  <rect x="90" y="130" width="260" height="220" rx="14" fill="#dbeafe" stroke="#2563eb"/>
  <text x="185" y="170" font-size="26" font-family="Arial" fill="#1e3a8a">Stdio</text>
  <text x="120" y="220" font-size="20" font-family="Arial" fill="#1e3a8a">- local process</text>
  <text x="120" y="255" font-size="20" font-family="Arial" fill="#1e3a8a">- easiest for desktop tools</text>
  <text x="120" y="290" font-size="20" font-family="Arial" fill="#1e3a8a">- depends on local runtime</text>
  <rect x="560" y="130" width="260" height="220" rx="14" fill="#dcfce7" stroke="#16a34a"/>
  <text x="665" y="170" font-size="26" font-family="Arial" fill="#166534">SSE</text>
  <text x="590" y="220" font-size="20" font-family="Arial" fill="#166534">- remote service</text>
  <text x="590" y="255" font-size="20" font-family="Arial" fill="#166534">- easier for cloud APIs</text>
  <text x="590" y="290" font-size="20" font-family="Arial" fill="#166534">- needs auth and ops</text>
  <polygon points="470,170 560,210 470,250 380,210" fill="#fde68a" stroke="#d97706"/>
  <text x="418" y="217" font-size="20" font-family="Arial" fill="#92400e">Where does the</text>
  <text x="420" y="242" font-size="20" font-family="Arial" fill="#92400e">capability live?</text>
  <line x1="350" y1="210" x2="380" y2="210" stroke="#374151" stroke-width="4"/>
  <line x1="560" y1="210" x2="560" y2="210" stroke="#374151" stroke-width="0"/>
  <text x="320" y="195" font-size="18" font-family="Arial" fill="#334155">Local</text>
  <text x="575" y="195" font-size="18" font-family="Arial" fill="#334155">Remote</text>
  <text x="60" y="430" font-size="20" font-family="Arial" fill="#475569">Most beginner confusion around MCP is transport and runtime setup, not the protocol idea itself.</text>
</svg>

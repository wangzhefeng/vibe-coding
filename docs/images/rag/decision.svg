<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520">
  <rect width="960" height="520" fill="#fffaf0"/>
  <text x="60" y="70" font-size="30" font-family="Arial" fill="#1f2937">RAG Strategy Ladder</text>
  <rect x="80" y="120" width="160" height="70" rx="12" fill="#dbeafe" stroke="#2563eb"/>
  <text x="111" y="163" font-size="22" font-family="Arial" fill="#1e3a8a">Baseline RAG</text>
  <rect x="290" y="120" width="170" height="70" rx="12" fill="#fde68a" stroke="#d97706"/>
  <text x="326" y="163" font-size="22" font-family="Arial" fill="#92400e">Hybrid + rerank</text>
  <rect x="510" y="120" width="170" height="70" rx="12" fill="#dcfce7" stroke="#16a34a"/>
  <text x="535" y="163" font-size="22" font-family="Arial" fill="#166534">Agentic RAG</text>
  <rect x="730" y="120" width="150" height="70" rx="12" fill="#fee2e2" stroke="#dc2626"/>
  <text x="762" y="163" font-size="22" font-family="Arial" fill="#991b1b">GraphRAG</text>
  <text x="100" y="255" font-size="20" font-family="Arial" fill="#1e3a8a">Use first</text>
  <text x="320" y="255" font-size="20" font-family="Arial" fill="#92400e">Use when recall is weak</text>
  <text x="515" y="255" font-size="20" font-family="Arial" fill="#166534">Use when tasks span tools</text>
  <text x="714" y="255" font-size="20" font-family="Arial" fill="#991b1b">Use when relations matter</text>
  <line x1="240" y1="155" x2="290" y2="155" stroke="#374151" stroke-width="4"/>
  <line x1="460" y1="155" x2="510" y2="155" stroke="#374151" stroke-width="4"/>
  <line x1="680" y1="155" x2="730" y2="155" stroke="#374151" stroke-width="4"/>
  <text x="60" y="430" font-size="20" font-family="Arial" fill="#475569">Climb the ladder only after baseline parsing, chunking, retrieval, and evaluation are stable.</text>
</svg>
